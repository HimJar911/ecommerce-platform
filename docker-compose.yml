version: "3.9"

services:
  order-service:
    build:
      context: .
      dockerfile: services/order_service/Dockerfile
    ports:
      - "8001:8001"
    environment:
      - PAYMENT_SERVICE_URL=http://payment-service:8002
      - INVENTORY_SERVICE_URL=http://inventory-service:8003
      - NOTIFICATION_SERVICE_URL=http://notification-service:8004
      - FRAUD_SERVICE_URL=http://fraud-service:8005
      - DB_HOST=postgres
      - REDIS_HOST=redis
      - RABBITMQ_HOST=rabbitmq
      - WEB_CONCURRENCY=9
    depends_on:
      - postgres
      - redis
      - payment-service
      - inventory-service
      - notification-service
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: "1.0"
          memory: "512M"
        reservations:
          cpus: "0.5"
          memory: "256M"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - ecomcore

  payment-service:
    build:
      context: .
      dockerfile: services/payment_service/Dockerfile
    ports:
      - "8002:8002"
    environment:
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - DB_HOST=postgres
      - REDIS_HOST=redis
      - WEB_CONCURRENCY=9
      - PAYMENT_RATE_LIMIT=500
      - DB_POOL_SIZE=20
    depends_on:
      - postgres
      - redis
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "0.5"
          memory: "256M"
    networks:
      - ecomcore

  inventory-service:
    build:
      context: .
      dockerfile: services/inventory_service/Dockerfile
    ports:
      - "8003:8003"
    environment:
      - DB_HOST=postgres
      - REDIS_HOST=redis
      - INVENTORY_RESERVE_TIMEOUT=30
      - INVENTORY_SYNC_INTERVAL=30
      - WEB_CONCURRENCY=9
      - REDIS_MAX_CONNECTIONS=100
    depends_on:
      - postgres
      - redis
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "0.5"
          memory: "256M"
    networks:
      - ecomcore

  notification-service:
    build:
      context: .
      dockerfile: services/notification_service/Dockerfile
    ports:
      - "8004:8004"
    environment:
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - RABBITMQ_HOST=rabbitmq
      - WEB_CONCURRENCY=4
    depends_on:
      - rabbitmq
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "0.5"
          memory: "256M"
    networks:
      - ecomcore

  celery-worker:
    build:
      context: .
      dockerfile: services/notification_service/Dockerfile
    command: celery -A notification_worker worker --loglevel=info --concurrency=8
    environment:
      - RABBITMQ_HOST=rabbitmq
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - NOTIFICATION_WORKER_COUNT=8
    depends_on:
      - rabbitmq
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: "1.0"
          memory: "512M"
    networks:
      - ecomcore

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ecomcore
      POSTGRES_USER: ecomcore_app
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_MAX_CONNECTIONS: 200
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: "2G"
    networks:
      - ecomcore

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru --maxclients 500
    volumes:
      - redis_data:/data
    networks:
      - ecomcore

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ecomcore
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: /ecomcore
    ports:
      - "15672:15672"
    networks:
      - ecomcore

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - order-service
    deploy:
      replicas: 2
    networks:
      - ecomcore

volumes:
  postgres_data:
  redis_data:

networks:
  ecomcore:
    driver: bridge
