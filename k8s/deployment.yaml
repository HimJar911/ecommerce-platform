apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: ecomcore
  labels:
    app: order-service
    version: "2.4.1"
spec:
  replicas: 6
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: 496006843764.dkr.ecr.us-east-1.amazonaws.com/ecomcore-order-service:latest
          ports:
            - containerPort: 8001
          env:
            - name: WEB_CONCURRENCY
              value: "9"
            - name: DB_POOL_SIZE
              value: "20"
            - name: PAYMENT_SERVICE_URL
              value: "http://payment-service.ecomcore.svc.cluster.local:8002"
            - name: INVENTORY_SERVICE_URL
              value: "http://inventory-service.ecomcore.svc.cluster.local:8003"
            - name: NOTIFICATION_SERVICE_URL
              value: "http://notification-service.ecomcore.svc.cluster.local:8004"
            - name: FRAUD_SERVICE_URL
              value: "http://fraud-service.ecomcore.svc.cluster.local:8005"
          resources:
            requests:
              cpu: "500m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 5
      terminationGracePeriodSeconds: 30

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: ecomcore
spec:
  replicas: 4
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
        - name: payment-service
          image: 496006843764.dkr.ecr.us-east-1.amazonaws.com/ecomcore-payment-service:latest
          ports:
            - containerPort: 8002
          env:
            - name: WEB_CONCURRENCY
              value: "9"
            - name: PAYMENT_RATE_LIMIT
              value: "500"
            - name: DB_POOL_SIZE
              value: "20"
          resources:
            requests:
              cpu: "500m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: ecomcore
spec:
  replicas: 4
  selector:
    matchLabels:
      app: inventory-service
  template:
    metadata:
      labels:
        app: inventory-service
    spec:
      containers:
        - name: inventory-service
          image: 496006843764.dkr.ecr.us-east-1.amazonaws.com/ecomcore-inventory-service:latest
          ports:
            - containerPort: 8003
          env:
            - name: INVENTORY_RESERVE_TIMEOUT
              value: "30"
            - name: INVENTORY_SYNC_INTERVAL
              value: "30"
            - name: REDIS_MAX_CONNECTIONS
              value: "100"
          resources:
            requests:
              cpu: "250m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: ecomcore
spec:
  replicas: 3
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: 496006843764.dkr.ecr.us-east-1.amazonaws.com/ecomcore-notification-service:latest
          ports:
            - containerPort: 8004
          env:
            - name: NOTIFICATION_WORKER_COUNT
              value: "8"
            - name: WEB_CONCURRENCY
              value: "4"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-workers
  namespace: ecomcore
spec:
  replicas: 6
  selector:
    matchLabels:
      app: celery-workers
  template:
    metadata:
      labels:
        app: celery-workers
    spec:
      containers:
        - name: celery-worker
          image: 496006843764.dkr.ecr.us-east-1.amazonaws.com/ecomcore-notification-service:latest
          command: ["celery", "-A", "notification_worker", "worker", "--concurrency=8"]
          env:
            - name: NOTIFICATION_WORKER_COUNT
              value: "8"
          resources:
            requests:
              cpu: "500m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: order-service-hpa
  namespace: ecomcore
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: order-service
  minReplicas: 6
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
